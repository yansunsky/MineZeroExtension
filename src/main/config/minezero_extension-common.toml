# MineZero Extension 配置文件
# 安全条件触发检查点
# 运行时切换: /gamerule safeCheckpointEnabled true|false
[safeCheckpoint]
	# 初始默认状态。false = 使用 MineZero 原生 autoCheckpointEnabled
	enabled = true
	# 全局死亡回归: 任意玩家死亡触发回归（默认关闭）
	globalDeathTrigger = false
	# 检查间隔（ticks），默认400（20秒）
	checkIntervalTicks = 400
	# 敌对生物搜索半径（格），默认24
	enemySearchRadius = 24

	# 每条件是否启用，默认全开
	[safeCheckpoint.conditions]
		overworld = true
		daytime = true
		healthFull = true
		hungerFull = true
		noNegativeEffects = true
		noHostileNearby = true

	# 每条件概率门（0.0-1.0），先掷骰再判条件
	# 累积: 0.90 × 0.75 × 0.75 × 0.55 × 0.60 × 1.00 ≈ 0.167 → ~2分钟1次
	[safeCheckpoint.chances]
		overworldChance = 0.90
		daytimeChance = 0.75
		healthFullChance = 0.75
		hungerFullChance = 0.55
		noNegativeEffectsChance = 0.60
		noHostileNearbyChance = 1.00
